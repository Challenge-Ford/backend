# https://github.com/evilmartians/lefthook

pre-commit:
  # First: auto-format staged files
  scripts:
    "fix-imports.sh":
      runner: bash

  # Then: run checks in parallel
  parallel: true
  commands:
    vet:
      glob: "**/*.go"
      run: go vet ./...
    build:
      glob: "**/*.go"
      run: go build ./...
    test:
      glob: "**/*.go"
      run: go test ./internal/modules/...
    no-todos:
      glob: "**/*.go"
      run: "grep -rn 'TODO\\|FIXME' --include='*.go' && exit 1 || exit 0"

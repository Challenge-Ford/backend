http:
  routers:
    gateway:
      entryPoints:
        - web
      rule: "PathPrefix(`/`)"
      service: oathkeeper
      middlewares:
        - rate-limit
        - secure-headers

  services:
    oathkeeper:
      loadBalancer:
        servers:
          - url: http://oathkeeper:4455

  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""

http:
  routers:
    assets:
      entryPoints:
        - web
      rule: "PathPrefix(`/assets/`)"
      priority: 10
      service: minio
      middlewares:
        - strip-assets
        - cors-assets

    minio-console:
      entryPoints:
        - web
      rule: "PathPrefix(`/minio`)"
      priority: 10
      service: minio-console
      middlewares:
        - strip-minio

    mailhog:
      entryPoints:
        - web
      rule: "PathPrefix(`/mailhog`)"
      priority: 10
      service: mailhog

    vault:
      entryPoints:
        - web
      rule: "PathPrefix(`/vault`)"
      priority: 10
      service: vault
      middlewares:
        - strip-vault

    gateway:
      entryPoints:
        - web
      rule: "PathPrefix(`/`)"
      priority: 1
      service: oathkeeper
      middlewares:
        - rate-limit
        - secure-headers

  services:
    oathkeeper:
      loadBalancer:
        servers:
          - url: http://oathkeeper:4455

    minio:
      loadBalancer:
        servers:
          - url: http://minio:9000

    minio-console:
      loadBalancer:
        servers:
          - url: http://minio:9001

    mailhog:
      loadBalancer:
        servers:
          - url: http://mailhog:8025

    vault:
      loadBalancer:
        servers:
          - url: http://vault:8200

  middlewares:
    strip-assets:
      stripPrefix:
        prefixes:
          - "/assets"

    strip-minio:
      stripPrefix:
        prefixes:
          - "/minio"

    strip-vault:
      stripPrefix:
        prefixes:
          - "/vault"

    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Powered-By: ""

    cors-assets:
      headers:
        accessControlAllowOriginList:
          - "http://localhost:5173"
        accessControlAllowMethods:
          - "GET"
          - "OPTIONS"
        accessControlAllowHeaders:
          - "Content-Type"
        accessControlMaxAge: 3600
        addVaryHeader: true

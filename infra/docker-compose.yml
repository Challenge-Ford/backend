name: torque

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - ./traefik:/etc/traefik:ro
    networks:
      - torque
    depends_on:
      - oathkeeper

  oathkeeper:
    image: oryd/oathkeeper:v0.40.8
    restart: unless-stopped
    command: serve --config /etc/config/oathkeeper/oathkeeper.yml
    ports:
      - "4455:4455"
      - "4456:4456"
    volumes:
      - ./oathkeeper:/etc/config/oathkeeper:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - torque
    depends_on:
      kratos:
        condition: service_started

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    restart: on-failure
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes
    environment:
      DSN: postgres://torque:torque@postgres:5432/torque?sslmode=disable&search_path=kratos
    volumes:
      - ./kratos:/etc/config/kratos:ro
    networks:
      - torque
    depends_on:
      postgres:
        condition: service_healthy

  kratos:
    image: oryd/kratos:v26.2.0
    restart: unless-stopped
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    environment:
      DSN: postgres://torque:torque@postgres:5432/torque?sslmode=disable&search_path=kratos
      LOG_LEVEL: info
    ports:
      - "4433:4433"
      - "4434:4434"
    volumes:
      - ./kratos:/etc/config/kratos:ro
    networks:
      - torque
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - torque

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: torque
      MINIO_ROOT_PASSWORD: torque123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - torque

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8026:8025"
    networks:
      - torque

networks:
  torque:
    name: torque

volumes:
  postgres-data:
  minio-data:

name: torque

services:
  traefik:
    image: traefik:v3.3
    restart: unless-stopped
    command:
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
    volumes:
      - ./traefik:/etc/traefik:ro
    networks:
      - torque
    depends_on:
      - oathkeeper

  oathkeeper:
    image: oryd/oathkeeper:v0.40.8
    restart: unless-stopped
    command: serve --config /etc/config/oathkeeper/oathkeeper.yml
    volumes:
      - ./oathkeeper:/etc/config/oathkeeper:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - torque
    depends_on:
      kratos:
        condition: service_started

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    restart: on-failure
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes
    environment:
      DSN: postgres://torque:torque@postgres:5432/torque?sslmode=disable&search_path=kratos
    volumes:
      - ./kratos:/etc/config/kratos:ro
    networks:
      - torque
    depends_on:
      postgres:
        condition: service_healthy

  kratos:
    image: oryd/kratos:v26.2.0
    restart: unless-stopped
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    environment:
      DSN: postgres://torque:torque@postgres:5432/torque?sslmode=disable&search_path=kratos
      LOG_LEVEL: info
    volumes:
      - ./kratos:/etc/config/kratos:ro
    networks:
      - torque
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5433:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - timescaledb-data:/var/lib/postgresql/data:rw
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - torque

  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - torque

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: torque
      MINIO_ROOT_PASSWORD: torque123
      MINIO_BROWSER_REDIRECT_URL: http://localhost/minio
    volumes:
      - minio-data:/data
    networks:
      - torque

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    environment:
      MH_UI_WEB_PATH: mailhog
    networks:
      - torque

  step-ca:
    image: smallstep/step-ca:latest
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: "Torque Device CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_ADDRESS: ":9000"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "torque"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/ca-password
      DOCKER_STEPCA_INIT_PROVISIONER_PASSWORD_FILE: /run/secrets/ca-password
    ports:
      - "9000:9000"
    volumes:
      - step-ca-data:/home/step
      - ./step-ca/password.txt:/run/secrets/ca-password:ro
    healthcheck:
      test: ["CMD", "step", "ca", "health", "--ca-url=https://localhost:9000", "--root=/home/step/certs/root_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - torque

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: torque
      RABBITMQ_DEFAULT_PASS: torque
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - torque

networks:
  torque:
    name: torque

volumes:
  postgres-data:
  timescaledb-data:
  minio-data:
  rabbitmq-data:
  step-ca-data:

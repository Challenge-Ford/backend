name: torque

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5433:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - timescaledb-data:/var/lib/postgresql/data:rw
    networks:
      - torque

  postgres:
    image: postgres:17.2-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: torque
      POSTGRES_PASSWORD: torque
      POSTGRES_DB: torque
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -d torque -U torque
      interval: 10s
      timeout: 30s
      retries: 10
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data:rw
    networks:
      - torque

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: torque
      MINIO_ROOT_PASSWORD: torque123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - torque

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 torque torque123;
        mc mb local/vehicle-models --ignore-existing;
        mc anonymous set download local/vehicle-models;
        mc cp /models/* local/vehicle-models/;
      "
    volumes:
      - ./minio:/models:ro
    networks:
      - torque

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
    networks:
      - torque

  step-ca:
    image: smallstep/step-ca:latest
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: "Torque Device CA"
      DOCKER_STEPCA_INIT_DNS_NAMES: "step-ca,localhost"
      DOCKER_STEPCA_INIT_ADDRESS: ":9000"
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: "torque"
      DOCKER_STEPCA_INIT_PASSWORD_FILE: /run/secrets/ca-password
      DOCKER_STEPCA_INIT_PROVISIONER_PASSWORD_FILE: /run/secrets/ca-password
    ports:
      - "9002:9000"
    volumes:
      - step-ca-data:/home/step
      - ./step-ca/password.txt:/run/secrets/ca-password:ro
    healthcheck:
      test: ["CMD-SHELL", "step ca health --ca-url=https://step-ca:9000 --root=/home/step/certs/root_ca.crt"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - torque

  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: torque
      RABBITMQ_DEFAULT_PASS: torque
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - torque

networks:
  torque:
    name: torque

volumes:
  postgres-data:
  timescaledb-data:
  minio-data:
  rabbitmq-data:
  step-ca-data:

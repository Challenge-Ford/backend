name: Build & Test

# Reusable workflow: builds every entrypoint, runs unit tests and lint,
# and validates the Terraform in infra/. Called by the feature, development
# and production pipelines so validation is identical everywhere.
on:
  workflow_call:

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Generate mocks
        run: |
          go install github.com/vektra/mockery/v2@v2.53.3
          "$(go env GOPATH)/bin/mockery"

      - name: go vet
        run: go vet ./...

      - name: Build entrypoints
        run: |
          go build -o /tmp/backend-api ./cmd/api
          go build -o /tmp/backend-worker ./cmd/worker
          go build -o /tmp/backend-cli ./cmd/cli

      - name: Test
        run: go test -race ./...

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform fmt
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra
        run: terraform validate
